<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AfterCare · Bệnh nhân</title>
  <link rel="icon" href="images/aftercare-logo.jpg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/patients.css">
</head>
<body data-page="patients">
  <div class="app-shell">
    <aside class="sidebar" aria-label="AfterCare"></aside>
    <main class="content">
      <header class="page-head">
        <div>
          <h1>Bệnh nhân</h1>
          <p class="sub">Danh sách bệnh nhân xuất viện đang được AfterCare theo dõi</p>
        </div>
        <div class="page-head-actions">
          <div class="segmented" id="viewToggle">
            <button data-view="list" class="active">Danh sách</button>
            <button data-view="card">Thẻ</button>
          </div>
        </div>
      </header>

      <div id="filters" class="filterbar"></div>
      <div id="resultMeta" class="result-meta"></div>
      <section id="patientView" aria-label="Kết quả"></section>
    </main>
  </div>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script src="js/patients.js"></script>
</body>
</html>
